version: 1
jobs:
  build-and-deploy:
    steps:
      - cd backend
      - npm install
      - npm run build
      - cd ..
      - npm install -g zcatalyst-cli@beta
      - catalyst deploy appsail --name foodlobby-backend --build-path backend/dist --stack node20
stages:
  - name: deploy
    jobs:
      - build-and-deploy