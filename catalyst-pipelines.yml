version: 1
jobs:
  build-and-deploy:
    steps:
      - cd backend
      - npm install
      - npm run build
      - cd ..
      - npm install -g zcatalyst-cli
      - CI=false catalyst deploy appsail --name foodlobby-backend --build-path /catalyst/backend/dist --stack node20 --token $CATALYST_PROJECT_SECRET_KEY --org 60068817749 -p 38697000000012093
stages:
  - name: deploy
    jobs:
      - build-and-deploy