version: 1
jobs:
  build-and-deploy:
    steps:
      - cd backend
      - npm install
      - npm run build
      - cd ..
      - npm install -g zcatalyst-cli@beta
      - catalyst deploy appsail --name foodlobby-backend --build-path backend/dist --stack node20 --token << env.CATALYST_TOKEN >> --org << env.CATALYST_ORG >> -p << env.CATALYST_PROJECT_ID >>
stages:
  - name: deploy
    jobs:
      - build-and-deploy