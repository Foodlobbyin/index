name = "foodlobbyin-backend"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
NODE_ENV = "production"

# Secrets (set via: wrangler secret put SECRET_NAME)
# DATABASE_URL
# JWT_SECRET
# EMAIL_HOST, EMAIL_PORT, EMAIL_USER, EMAIL_PASSWORD, EMAIL_FROM (Phase 2)
# RECAPTCHA_SECRET_KEY
# FRONTEND_URL
# MAX_OTP_GENERATION_PER_HOUR
# MAX_OTP_VERIFICATION_ATTEMPTS
# OTP_EXPIRY_MINUTES
# RATE_LIMIT_MAX

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "PLACEHOLDER_KV_ID"
preview_id = "PLACEHOLDER_KV_PREVIEW_ID"
