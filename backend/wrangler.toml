name = "foodlobbyin-backend"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Custom domain — api.foodlobby.in (configured via Workers dashboard)
routes = [
  { pattern = "api.foodlobby.in/*", zone_name = "foodlobby.in" }
]

[vars]
NODE_ENV = "production"
FRONTEND_URL = "https://foodlobby.in"

# Secrets (set via: wrangler secret put SECRET_NAME)
# DATABASE_URL
# JWT_SECRET
# EMAIL_FROM
# RESEND_API_KEY — HTTP email via Resend (https://resend.com)
# RECAPTCHA_SECRET_KEY
# MAX_OTP_GENERATION_PER_HOUR
# MAX_OTP_VERIFICATION_ATTEMPTS
# OTP_EXPIRY_MINUTES
# RATE_LIMIT_MAX

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "c8bafedbc0db4644a133ab0feeb22d29"
preview_id = "c7f1edb81ada49738faf8bf6ad171fa4"

[[r2_buckets]]
binding = "EVIDENCE_BUCKET"
bucket_name = "foodlobbyin-evidence"

