name: Deploy Backend to Catalyst AppSail

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: ./backend

      - name: Build TypeScript
        run: npm run build
        working-directory: ./backend
        env:
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Install Catalyst CLI
        run: npm install -g zcatalyst-cli

      - name: Get Catalyst Access Token
        id: get_token
        run: |
          RESPONSE=$(curl -s -X POST "https://accounts.zoho.in/oauth/v2/token" \
            -d "grant_type=refresh_token" \
            -d "refresh_token=${{ secrets.CATALYST_TOKEN }}" \
            -d "client_id=${{ secrets.CATALYST_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.CATALYST_CLIENT_SECRET }}")
          ACCESS_TOKEN=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          echo "access_token=$ACCESS_TOKEN" >> $GITHUB_OUTPUT

      - name: Copy catalyst.json to backend/dist
        run: cp catalyst.json backend/dist/catalyst.json

      - name: Deploy to AppSail
        working-directory: ./backend/dist
        run: |
          catalyst deploy appsail \
          --name foodlobby-backend \
          --stack NodeJS20 \
          --command "node index.js" \
          --org ${{ secrets.CATALYST_ACCOUNT_ID }} \
          --project ${{ secrets.CATALYST_PROJECT_ID }} \
          --token ${{ steps.get_token.outputs.access_token }}
