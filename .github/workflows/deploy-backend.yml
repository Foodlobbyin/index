name: Deploy Backend to Catalyst AppSail

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: ./backend

      - name: Build TypeScript
        run: npm run build
        working-directory: ./backend
        env:
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Install Catalyst CLI
        run: npm install -g zcatalyst-cli

      - name: Deploy to AppSail
        run: |
          catalyst deploy appsail \
          --name foodlobby-backend \
          --stack NodeJS20 \
          --build-path $GITHUB_WORKSPACE/backend/dist \
          --command "node dist/index.js" \
          --org ${{ secrets.CATALYST_ACCOUNT_ID }} \
          --project ${{ secrets.CATALYST_PROJECT_ID }} \
          --token ${{ secrets.CATALYST_TOKEN }}
