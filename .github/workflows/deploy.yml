# Frontend is now deployed via Cloudflare Pages (native Git integration)
# Cloudflare Pages automatically builds and deploys on every push to main
# that affects the frontend/ directory.
#
# Cloudflare Pages Project: foodlobbyin-frontend
# Live URL: https://foodlobbyin-frontend.pages.dev
#
# Build settings configured in Cloudflare Pages dashboard:
#   Framework preset: React (Vite)
#   Root directory:   /frontend
#   Build command:    npm run build
#   Output directory: dist
#
# This file is kept as documentation. No GitHub Actions workflow
# is needed since Cloudflare Pages handles CI/CD natively.

name: Deploy Frontend to Cloudflare Pages (Info Only)

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  info:
    runs-on: ubuntu-latest
    steps:
      - name: Deployment info
        run: |
          echo "Frontend is automatically deployed to Cloudflare Pages."
          echo "URL: https://foodlobbyin-frontend.pages.dev"
          echo "Cloudflare Pages handles the build and deployment natively."
