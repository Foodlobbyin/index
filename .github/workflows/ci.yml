name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-backend:
    name: Backend TypeScript Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: ./backend

      - name: TypeScript build check
        run: npm run build
        working-directory: ./backend

  build-frontend:
    name: Frontend TypeScript Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: ./frontend

      - name: TypeScript + Vite build
        run: npm run build
        working-directory: ./frontend
